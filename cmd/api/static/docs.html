<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SafeRoute API - Documentación</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui.min.css">
  <style>
    body { margin: 0; background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    .custom-header { background: #0f172a; color: #fff; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #f59e0b; }
    .custom-header h1 { margin: 0; font-size: 1.5rem; }
    .badge { background: #f59e0b; color: #0f172a; font-size: 0.8rem; padding: 3px 8px; border-radius: 12px; font-weight: bold; }
    .swagger-ui .topbar { display: none; }
    #swagger-ui { max-width: 1200px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="custom-header">
    <h1>🚛 SafeRoute API Gateway</h1>
    <span class="badge">v1.0.0</span>
  </div>
  <div id="swagger-ui"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui-standalone-preset.min.js"></script>

  <script>
    window.onload = function() {
      // Swagger spec INLINE - no depende de archivo externo
      const spec = {
        "openapi": "3.0.3",
        "info": {
          "title": "SafeRoute API Gateway",
          "version": "1.0.0",
          "description": "API para administración de flotas de transporte en Chiapas. Autenticación JWT requerida para endpoints protegidos."
        },
        "servers": [{ "url": "https://saferoute-api-m4i5.onrender.com", "description": "Producción" }],
        "tags": [
          { "name": "Auth", "description": "Autenticación" },
          { "name": "Reportes", "description": "Gestión de reportes comunitarios" },
          { "name": "Rutas", "description": "Cálculo de rutas seguras" },
          { "name": "Admin", "description": "Endpoints de administrador" }
        ],
        "paths": {
          "/api/health": {
            "get": {
              "tags": ["Auth"],
              "summary": "Health check",
              "responses": { "200": { "description": "Servicio funcionando" } }
            }
          },
          "/api/auth/login": {
            "post": {
              "tags": ["Auth"],
              "summary": "Iniciar sesión",
              "requestBody": {
                "content": { "application/json": { "schema": { "type": "object", "properties": { "email": { "type": "string" }, "password": { "type": "string" } } } } }
              },
              "responses": { "200": { "description": "Token JWT" }, "401": { "description": "Credenciales inválidas" } }
            }
          },
          "/api/reportes": {
            "get": {
              "tags": ["Reportes"],
              "summary": "Listar reportes",
              "parameters": [
                { "name": "tipo", "in": "query", "schema": { "type": "string" } },
                { "name": "vigente", "in": "query", "schema": { "type": "string" } },
                { "name": "limit", "in": "query", "schema": { "type": "integer" } },
                { "name": "offset", "in": "query", "schema": { "type": "integer" } }
              ],
              "security": [{ "bearerAuth": [] }],
              "responses": { "200": { "description": "Lista de reportes" } }
            },
            "post": {
              "tags": ["Reportes"],
              "summary": "Crear reporte",
              "security": [{ "bearerAuth": [] }],
              "responses": { "201": { "description": "Reporte creado" } }
            }
          },
          "/api/reportes/cercanos": {
            "get": {
              "tags": ["Reportes"],
              "summary": "Reportes cercanos a coordenadas",
              "parameters": [
                { "name": "lat", "in": "query", "required": true, "schema": { "type": "number" } },
                { "name": "lon", "in": "query", "required": true, "schema": { "type": "number" } },
                { "name": "radio_km", "in": "query", "schema": { "type": "number" } }
              ],
              "security": [{ "bearerAuth": [] }],
              "responses": { "200": { "description": "Reportes cercanos" } }
            }
          },
          "/api/reportes/estadisticas": {
            "get": {
              "tags": ["Reportes"],
              "summary": "Estadísticas de reportes",
              "security": [{ "bearerAuth": [] }],
              "responses": { "200": { "description": "Estadísticas" } }
            }
          },
          "/api/rutas": {
            "post": {
              "tags": ["Rutas"],
              "summary": "Calcular rutas seguras",
              "security": [{ "bearerAuth": [] }],
              "responses": { "200": { "description": "Rutas calculadas" } }
            }
          },
          "/api/admin/resumen": {
            "get": {
              "tags": ["Admin"],
              "summary": "Resumen semanal NLP + LLM",
              "security": [{ "bearerAuth": [] }],
              "responses": { "200": { "description": "Resumen generado" } }
            }
          },
          "/api/admin/buscar": {
            "post": {
              "tags": ["Admin"],
              "summary": "Buscar reportes (TF-IDF/BM25)",
              "security": [{ "bearerAuth": [] }],
              "responses": { "200": { "description": "Resultados de búsqueda" } }
            }
          }
        },
        "components": {
          "securitySchemes": {
            "bearerAuth": {
              "type": "http",
              "scheme": "bearer",
              "bearerFormat": "JWT"
            }
          }
        }
      };

      SwaggerUIBundle({
        spec: spec,
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: "StandaloneLayout",
        docExpansion: "list"
      });
    };
  </script>
</body>
</html>
