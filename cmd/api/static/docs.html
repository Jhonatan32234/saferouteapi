<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SafeRoute API - Documentación de Referencia</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui.min.css">

  <style>
    html {
      box-sizing: border-box;
      overflow-y: scroll;
    }
    *, *:before, *:after {
      box-sizing: inherit;
    }
    body {
      margin: 0;
      background: #f4f6f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .swagger-ui .topbar {
      background-color: #1e293b;
      padding: 10px 0;
    }
    .swagger-ui .topbar .download-url-wrapper input[type=text] {
      border: 2px solid #3b82f6;
      border-radius: 4px;
    }
    .swagger-ui .topbar .download-url-wrapper .download-url-button {
      background: #3b82f6;
      border-radius: 4px;
    }
    .custom-header {
      background: #0f172a;
      color: #ffffff;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #f59e0b;
    }
    .custom-header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .custom-header .badge {
      background: #f59e0b;
      color: #0f172a;
      font-size: 0.8rem;
      padding: 3px 8px;
      border-radius: 12px;
      font-weight: bold;
    }
    /* Contenedor principal de Swagger */
    .swagger-ui {
      max-width: 1200px;
      margin: 30px auto;
      padding: 20px;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }
    /* Título de la API dentro de Swagger */
    .swagger-ui .info .title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #0f172a; /* Slate 900 */
      font-size: 2rem;
    }

    /* El botón de la URL de descarga o el path */
    .swagger-ui .info .base-url {
      background: #e2e8f0; /* Slate 200 */
      padding: 4px 8px;
      border-radius: 4px;
      color: #334155;
      font-weight: 600;
    }

    /* Hacer los bordes de los bloques de endpoints más suaves */
    .swagger-ui .opblock {
      border-radius: 6px;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    }

    /* Cambiar el botón de "Try it out" para que combine con tu esquema azul/ámbar */
    .swagger-ui .btn.try-out__btn {
      background-color: #3b82f6; /* Blue 500 */
      color: white;
      border: none;
      border-radius: 4px;
      transition: background 0.2s ease;
    }

    .swagger-ui .btn.try-out__btn:hover {
      background-color: #2563eb; /* Blue 600 */
    }
    /* Ocultar la barra de búsqueda nativa de Swagger para dejar solo tu header personalizado */
.swagger-ui .topbar {
  display: none;
}
  </style>
</head>

<body>
  <div class="custom-header">
    <h1>SafeRoute API Gateway</h1>
    <span class="badge">v1.0.0</span>
  </div>

  <div id="swagger-ui"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui-standalone-preset.min.js"></script>

  <script>
    window.onload = function() {
      // Usamos "./swagger.json" porque según tu árbol de carpetas tienes un swagger.json en static/
      const ui = SwaggerUIBundle({
        url: "./swagger.json", 
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout",
        docExpansion: "list",
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 1,
        supportedSubmitMethods: ["get", "post", "put", "delete"]
      });
      window.ui = ui;
    };
  </script>
</body>
</html>
